<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Masum Notes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tiro+Bangla&family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper: #F5EEDC;
    --paper-dark: #ECE2C8;
    --margin-red: #A13D2C;
    --ink: #23303A;
    --ink-soft: #56605F;
    --gold: #A9852E;
    --present: #3E6B4F;
    --leave: #9A8F7A;
    --card-shadow: 0 2px 10px rgba(35,48,58,0.10);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper-dark);
    font-family:'Hind Siliguri', sans-serif;
    color:var(--ink);
    min-height:100vh;
  }
  .page{
    max-width:480px;
    margin:0 auto;
    min-height:100vh;
    background:var(--paper);
    position:relative;
    padding:24px 20px 60px 34px;
    border-left:6px solid var(--margin-red);
    box-shadow:var(--card-shadow);
  }
  .page::before{
    content:"";
    position:absolute;
    left:14px; top:0; bottom:0;
    width:2px;
    background:var(--margin-red);
    opacity:0.35;
  }
  h1{
    font-family:'Tiro Bangla', serif;
    font-size:1.7rem;
    color:var(--margin-red);
    margin:0 0 2px 0;
    letter-spacing:0.3px;
  }
  .subtitle{
    font-size:0.85rem;
    color:var(--ink-soft);
    margin-bottom:22px;
  }
  .add-worker{
    display:flex;
    gap:8px;
    margin-bottom:22px;
  }
  .add-worker input{
    flex:1;
    padding:10px 12px;
    border:1px solid var(--gold);
    border-radius:4px;
    background:#fffdf6;
    font-family:'Hind Siliguri', sans-serif;
    font-size:0.95rem;
    color:var(--ink);
  }
  .add-worker button, .primary-btn{
    background:var(--margin-red);
    color:#fff8ec;
    border:none;
    border-radius:4px;
    padding:10px 16px;
    font-family:'Hind Siliguri', sans-serif;
    font-weight:600;
    font-size:0.95rem;
    cursor:pointer;
  }
  .add-worker button:active, .primary-btn:active{ opacity:0.85; }

  .worker-card{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#fffdf6;
    border:1px solid #e3d6b0;
    border-left:4px solid var(--gold);
    border-radius:6px;
    padding:14px 16px;
    margin-bottom:12px;
    cursor:pointer;
  }
  .worker-card .name{
    font-family:'Tiro Bangla', serif;
    font-size:1.15rem;
    color:var(--ink);
  }
  .worker-card .total{
    font-weight:700;
    color:var(--present);
    font-size:1rem;
  }
  .worker-card .month-label{
    font-size:0.75rem;
    color:var(--ink-soft);
    display:block;
    margin-top:2px;
  }
  .empty-note{
    text-align:center;
    color:var(--ink-soft);
    font-size:0.9rem;
    padding:30px 10px;
    border:1px dashed #c9b98a;
    border-radius:6px;
  }

  /* detail view */
  .back-btn{
    background:none;
    border:none;
    color:var(--margin-red);
    font-size:0.9rem;
    font-weight:600;
    cursor:pointer;
    padding:0 0 16px 0;
  }
  .detail-header{
    font-family:'Tiro Bangla', serif;
    font-size:1.5rem;
    color:var(--ink);
    margin-bottom:2px;
  }
  .stamp{
    display:inline-block;
    border:2px solid var(--present);
    color:var(--present);
    padding:8px 14px;
    border-radius:6px;
    font-weight:700;
    font-size:1.05rem;
    transform:rotate(-1.5deg);
    margin:14px 0 22px 0;
    background:rgba(62,107,79,0.06);
  }
  .entry-form{
    display:flex;
    gap:8px;
    align-items:center;
    margin-bottom:18px;
    flex-wrap:wrap;
    background:#fffdf6;
    border:1px solid #e3d6b0;
    padding:12px;
    border-radius:6px;
  }
  .entry-form input[type="date"], .entry-form input[type="number"]{
    padding:9px 10px;
    border:1px solid var(--gold);
    border-radius:4px;
    font-family:'Hind Siliguri', sans-serif;
    background:#fff;
    font-size:0.9rem;
  }
  .entry-form input[type="number"]{ width:80px; }
  .entry-form label{
    display:flex;
    align-items:center;
    gap:5px;
    font-size:0.85rem;
    color:var(--ink-soft);
  }
  .entries-list{ list-style:none; padding:0; margin:0; }
  .entries-list li{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px 0;
    border-bottom:1px dotted #c9b98a;
    font-size:0.95rem;
  }
  .entries-list .date{ color:var(--ink-soft); }
  .entries-list .hours{ font-weight:600; color:var(--present); }
  .entries-list .leave-tag{ font-weight:600; color:var(--leave); font-style:italic; }
  .del-btn{
    background:none; border:none; color:#b1493c; font-size:0.8rem; cursor:pointer; margin-left:10px;
  }
  .month-nav{
    display:flex; justify-content:center; align-items:center; gap:8px; margin-bottom:10px;
  }
  .month-nav button{
    background:none; border:1px solid var(--gold); color:var(--gold); border-radius:4px; padding:4px 10px; cursor:pointer; font-size:1.1rem;
  }
  .month-nav select{
    border:1px solid var(--gold);
    border-radius:4px;
    padding:6px 8px;
    background:#fffdf6;
    font-family:'Hind Siliguri', sans-serif;
    font-size:0.9rem;
    color:var(--ink);
  }

  .bulk-box{
    background:#fffdf6;
    border:1px solid #e3d6b0;
    border-radius:6px;
    padding:12px;
    margin-bottom:18px;
  }
  .bulk-box summary{
    cursor:pointer;
    font-weight:600;
    color:var(--gold);
    font-size:0.9rem;
  }
  .bulk-box textarea{
    width:100%;
    min-height:110px;
    margin-top:10px;
    padding:10px;
    border:1px solid var(--gold);
    border-radius:4px;
    font-family:'Hind Siliguri', sans-serif;
    font-size:0.9rem;
    resize:vertical;
  }
  .bulk-hint{
    font-size:0.78rem;
    color:var(--ink-soft);
    margin:8px 0 10px 0;
    line-height:1.5;
  }
  .bulk-result{
    font-size:0.85rem;
    margin-top:8px;
    color:var(--present);
  }

  .top-links{
    display:flex;
    justify-content:flex-end;
    margin-bottom:-6px;
  }
  .top-links button{
    background:none;
    border:none;
    color:var(--gold);
    font-size:0.85rem;
    font-weight:600;
    cursor:pointer;
    text-decoration:underline;
    padding:0;
  }
  .about-bio{
    width:100%;
    min-height:90px;
    padding:10px;
    border:1px solid var(--gold);
    border-radius:4px;
    font-family:'Hind Siliguri', sans-serif;
    font-size:0.95rem;
    resize:vertical;
    margin-bottom:20px;
    background:#fffdf6;
  }
  .link-row{
    display:flex;
    gap:8px;
    align-items:center;
    margin-bottom:10px;
  }
  .link-row input{
    padding:9px 10px;
    border:1px solid var(--gold);
    border-radius:4px;
    font-family:'Hind Siliguri', sans-serif;
    font-size:0.9rem;
    background:#fffdf6;
  }
  .link-row .label-input{ width:34%; }
  .link-row .url-input{ flex:1; }
  .link-list-view a{
    display:block;
    background:#fffdf6;
    border:1px solid #e3d6b0;
    border-left:4px solid var(--margin-red);
    border-radius:6px;
    padding:12px 14px;
    margin-bottom:10px;
    color:var(--ink);
    text-decoration:none;
    font-weight:600;
  }
  .section-title{
    font-family:'Tiro Bangla', serif;
    font-size:1.1rem;
    color:var(--margin-red);
    margin:22px 0 10px 0;
  }
  .profile-photo-wrap{
    text-align:center;
    margin-bottom:8px;
  }
  .profile-photo{
    width:140px;
    height:140px;
    border-radius:50%;
    object-fit:cover;
    border:3px solid var(--gold);
    box-shadow:var(--card-shadow);
  }
  .profile-photo-empty{
    display:flex;
    align-items:center;
    justify-content:center;
    color:var(--ink-soft);
    font-size:0.85rem;
    background:#eee3c4;
  }

  .quick-links{
    display:flex;
    justify-content:center;
    gap:18px;
    flex-wrap:wrap;
    margin-top:30px;
    padding-top:20px;
    border-top:1px dashed #c9b98a;
  }
  .quick-links a{
    display:flex;
    align-items:center;
    justify-content:center;
    width:52px;
    height:52px;
    border-radius:50%;
    color:#fff;
    font-family:'Hind Siliguri', sans-serif;
    font-weight:700;
    font-size:1.3rem;
    text-decoration:none;
    box-shadow:var(--card-shadow);
  }
  .quick-links a.fb{ background:#1877F2; }
  .quick-links a.blogger{ background:#FF8000; }
  .quick-links a.art{ background:var(--margin-red); font-size:1.4rem; }
  .quick-links a.website{ background:var(--gold); font-size:1.4rem; }

  .home-header{
    display:flex;
    align-items:center;
    gap:14px;
    margin-bottom:20px;
  }
  .home-photo{
    width:64px;
    height:64px;
    border-radius:50%;
    object-fit:cover;
    border:2px solid var(--gold);
    flex-shrink:0;
  }
  .home-header h1{ margin-bottom:2px; }
  .home-header .subtitle{ margin-bottom:0; }
</style>
</head>
<body>
<div class="page" id="app">লোড হচ্ছে...</div>

<script>
const bnDigits = ['০','১','২','৩','৪','৫','৬','৭','৮','৯'];
function toBn(n){ return String(n).replace(/[0-9]/g, d => bnDigits[d]); }
const bnMonths = ['জানুয়ারি','ফেব্রুয়ারি','মার্চ','এপ্রিল','মে','জুন','জুলাই','আগস্ট','সেপ্টেম্বর','অক্টোবর','নভেম্বর','ডিসেম্বর'];

function fmtDate(iso){
  const [y,m,d] = iso.split('-').map(Number);
  return `${toBn(d)}/${toBn(m)}/${toBn(y)}`;
}
function monthKey(iso){ return iso.slice(0,7); } // YYYY-MM
function monthLabel(key){
  const [y,m] = key.split('-').map(Number);
  return `${bnMonths[m-1]} ${toBn(y)}`;
}

let state = { workers: [], entries: {}, about: { bio: '', photo: '', links: [] }, settings: { pin: '2003' } };

const STORAGE_KEY = 'worklog-data';

function loadData(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      state = JSON.parse(raw);
      if(!state.about) state.about = { bio:'', photo:'', links:[] };
      if(state.about.photo === undefined) state.about.photo = '';
      if(!state.settings) state.settings = { pin: '' };
    } else {
      seedInitialData();
      saveData();
    }
  }catch(e){
    seedInitialData();
    saveData();
  }
  render();
}

function saveData(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }catch(e){
    console.error('সংরক্ষণ ব্যর্থ হয়েছে', e);
    alert('ডেটা সেভ করা যায়নি। ব্রাউজারের স্টোরেজ পূর্ণ বা বন্ধ থাকতে পারে।');
  }
}

const bnToLatinDigit = {'০':'0','১':'1','২':'2','৩':'3','৪':'4','৫':'5','৬':'6','৭':'7','৮':'8','৯':'9'};
function toLatinDigits(s){ return s.replace(/[০-৯]/g, d => bnToLatinDigit[d]); }

function parseBulkText(text){
  const lines = text.split('\n');
  const results = [];
  const skipped = [];
  for(let raw of lines){
    const line = raw.trim();
    if(!line) continue;
    const converted = toLatinDigits(line);
    const dm = converted.match(/(\d{1,2})[\/\-.](\d{1,2})[\/\-.](\d{4})/);
    if(!dm){ skipped.push(line); continue; }
    const [full, d, m, y] = dm;
    const iso = `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    let rest = converted.slice(dm.index + full.length).trim();
    rest = rest.replace(/^[=:\-]\s*/, '').trim();
    const isLeave = /❌|ছুটি|leave/i.test(line) || rest === '';
    if(isLeave){
      results.push({date: iso, hours: 0, leave: true});
    } else {
      const num = parseFloat(rest);
      if(!isNaN(num)){
        results.push({date: iso, hours: num, leave: false});
      } else {
        skipped.push(line);
      }
    }
  }
  return { results, skipped };
}

function currentMonthKeyDefault(){
  const d = new Date();
  return d.toISOString().slice(0,7);
}

function totalForMonth(name, mKey){
  const list = state.entries[name] || [];
  return list.filter(e => !e.leave && monthKey(e.date) === mKey)
             .reduce((sum,e) => sum + Number(e.hours||0), 0);
}

function allMonthsForWorker(name){
  const list = state.entries[name] || [];
  const set = new Set(list.map(e => monthKey(e.date)));
  set.add(currentMonthKeyDefault());
  return Array.from(set).sort();
}

function render(){
  const app = document.getElementById('app');
  if(view.screen === 'list'){
    app.innerHTML = renderList();
    bindListEvents();
  } else if(view.screen === 'about'){
    app.innerHTML = renderAbout();
    bindAboutEvents();
  } else {
    app.innerHTML = renderDetail();
    bindDetailEvents();
  }
}

        <span class="month-label">${monthLabel(mKey)}</span>

function renderDetail(){
  const name = view.worker;
  const mKey = view.month || currentMonthKeyDefault();
  const [curY, curM] = mKey.split('-').map(Number);
  const total = totalForMonth(name, mKey);
  const entries = (state.entries[name]||[])
    .filter(e => monthKey(e.date) === mKey)
    .sort((a,b) => b.date.localeCompare(a.date));

  const rows = entries.map((e, i) => {
    const originalIdx = (state.entries[name]||[]).indexOf(e);
    return `<li>
      <span class="date">${fmtDate(e.date)}</span>
      ${e.leave
        ? `<span class="leave-tag">ছুটি</span>`
        : `<span class="hours">${toBn(e.hours)} ঘন্টা</span>`}
      <button class="del-btn" data-idx="${originalIdx}">✕</button>
    </li>`;
  }).join('') || `<div class="empty-note">এই মাসে কোনো এন্ট্রি নেই</div>`;

  const thisYear = new Date().getFullYear();
  const yearOptions = [];
  for(let y = thisYear - 3; y <= thisYear + 3; y++){
    yearOptions.push(`<option value="${y}" ${y===curY?'selected':''}>${toBn(y)}</option>`);
  }
  const monthOptions = bnMonths.map((name2, i) => {
    const mNum = i + 1;
    return `<option value="${mNum}" ${mNum===curM?'selected':''}>${name2}</option>`;
  }).join('');

  return `
    <button class="back-btn" id="backBtn">← সব কর্মী</button>
    <div class="detail-header">${escapeHtml(name)}</div>
    <div class="month-nav">
      <button id="prevMonth">‹</button>
      <select id="monthSelect">${monthOptions}</select>
      <select id="yearSelect">${yearOptions.join('')}</select>
      <button id="nextMonth">›</button>
    </div>
    <div class="stamp">মোট = ${toBn(total)} ঘন্টা</div>
    <div style="margin:-10px 0 20px 0;">
      <a href="https://canva.link/3evzxqp7ef0y0p0" target="_blank" rel="noopener" class="primary-btn" style="display:inline-block;text-decoration:none;">গত মাসে হিসাব দেখুন</a>
    </div>

    <div class="entry-form">
      <input type="date" id="entryDate" value="${mKey}-01">
      <input type="number" id="entryHours" min="0" step="0.5" placeholder="ঘন্টা">
      <label><input type="checkbox" id="entryLeave"> ছুটি</label>
      <button class="primary-btn" id="addEntryBtn">যোগ করুন</button>
    </div>

    <details class="bulk-box">
      <summary>আগের অনেক দিনের হিসাব একসাথে বসান</summary>
      <div class="bulk-hint">
        প্রতি লাইনে একটা তারিখ লিখুন, এভাবে:<br>
        ৩/৭/২০২৬=১০ &nbsp; অথবা &nbsp; ৪/৭/২০২৬ ❌ (ছুটি হলে)
      </div>
      <textarea id="bulkText" placeholder="১/৭/২০২৬❌
২/৭/২০২৬❌
৩/৭/২০২৬=১০
৪/৭/২০২৬=১২"></textarea>
      <button class="primary-btn" id="bulkAddBtn" style="margin-top:10px;">সব একসাথে যোগ করুন</button>
      <div class="bulk-result" id="bulkResult"></div>
    </details>

    <ul class="entries-list">${rows}</ul>
  `;
}

function escapeHtml(s){
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function renderAbout(){
  const about = state.about || { bio:'', links:[] };
  const linkRows = about.links.map((l, i) => `
    <div class="link-row" data-idx="${i}">
      <input type="text" class="label-input" value="${escapeHtml(l.label)}" placeholder="নাম (যেমন: ফেসবুক)">
      <input type="text" class="url-input" value="${escapeHtml(l.url)}" placeholder="https://...">
      <button class="del-btn" data-idx="${i}">✕</button>
    </div>
  `).join('');

  const publicLinks = about.links.filter(l => l.url && l.url.trim()).map(l =>
    `<a href="${escapeHtml(l.url)}" target="_blank" rel="noopener">${escapeHtml(l.label)}</a>`
  ).join('') || `<div class="empty-note">এখনো কোনো লিংক যোগ করা হয়নি।</div>`;

  return `
    <button class="back-btn" id="backBtn">← ফিরে যাও</button>
    <div class="detail-header">সম্পর্কে ও লিংক</div>

    <div class="profile-photo-wrap">
      ${about.photo ? `<img src="${about.photo}" class="profile-photo" alt="প্রোফাইল ছবি">` : `<div class="profile-photo profile-photo-empty">ছবি নেই</div>`}
      <input type="file" id="photoInput" accept="image/*" style="display:none;">
      <button class="primary-btn" id="changePhotoBtn" style="margin-top:10px;">ছবি পরিবর্তন করুন</button>
    </div>

    <div class="section-title">নিজের সম্পর্কে</div>
    <textarea class="about-bio" id="bioText" placeholder="নিজের সম্পর্কে ছোট্ট পরিচিতি লিখুন...">${escapeHtml(about.bio)}</textarea>

    <div class="section-title">লিংকসমূহ (এডিট করুন)</div>
    <div id="linkRows">${linkRows}</div>
    <button class="primary-btn" id="addLinkBtn" style="margin-bottom:20px;">নতুন লিংক যোগ করুন</button>
    <button class="primary-btn" id="saveAboutBtn" style="background:var(--present);margin-bottom:26px;">সেভ করুন</button>

    <div class="section-title">ভিজিটর যা দেখবে</div>
    <div class="link-list-view">${publicLinks}</div>

    <div class="section-title">এডিট-পিন (শুধু তুমি এডিট করতে পারবে)</div>
    <div class="bulk-hint">পিন সেট করলে, সাইটে ঢুকে যেকোনো কিছু যোগ/মোছার আগে এই পিনটা চাইবে। খালি রাখলে যে কেউ (এই ডিভাইসে) এডিট করতে পারবে।</div>
    <div class="entry-form">
      <input type="text" id="pinInput" placeholder="নতুন পিন (যেমন: 1234)" value="${escapeHtml(state.settings.pin || '')}">
      <button class="primary-btn" id="savePinBtn">পিন সেভ করুন</button>
    </div>
  `;
}

function bindAboutEvents(){
  document.getElementById('backBtn').onclick = () => {
    view.screen = 'list';
    safeHistory(() => history.pushState({screen:'list'}, '', '#'));
    render();
  };
  document.getElementById('changePhotoBtn').onclick = () => {
    if(!requirePin()) return;
    document.getElementById('photoInput').click();
  };
  document.getElementById('photoInput').onchange = (e) => {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = async () => {
      state.about.photo = reader.result;
      await saveData();
      render();
    };
    reader.readAsDataURL(file);
  };
  document.getElementById('addLinkBtn').onclick = () => {
    if(!requirePin()) return;
    if(!state.about) state.about = { bio:'', links:[] };
    state.about.links.push({ label:'', url:'' });
    render();
  };
  document.querySelectorAll('#linkRows .del-btn').forEach(btn => {
    btn.onclick = () => {
      if(!requirePin()) return;
      const i = Number(btn.dataset.idx);
      state.about.links.splice(i,1);
      render();
    };
  });
  document.getElementById('saveAboutBtn').onclick = async () => {
    if(!requirePin()) return;
    const bio = document.getElementById('bioText').value;
    const rows = document.querySelectorAll('#linkRows .link-row');
    const links = Array.from(rows).map(row => ({
      label: row.querySelector('.label-input').value.trim(),
      url: row.querySelector('.url-input').value.trim()
    }));
    state.about.bio = bio;
    state.about.links = links;
    await saveData();
    render();
  };
  document.getElementById('savePinBtn').onclick = async () => {
    if(!requirePin()) return;
    const newPin = document.getElementById('pinInput').value.trim();
    state.settings.pin = newPin;
    await saveData();
    alert(newPin ? 'পিন সেভ হয়েছে।' : 'পিন মুছে ফেলা হয়েছে, এখন যে কেউ এডিট করতে পারবে।');
    render();
  };
}

function bindListEvents(){
  document.getElementById('goAboutBtn').onclick = () => {
    view.screen = 'about';
    safeHistory(() => history.pushState({screen:'about'}, '', '#about'));
    render();
  };
  document.getElementById('addWorkerBtn').onclick = async () => {
    if(!requirePin()) return;
    const input = document.getElementById('newWorkerName');
    const name = input.value.trim();
    if(!name) return;
    if(!state.workers.includes(name)){
      state.workers.push(name);
      state.entries[name] = [];
      await saveData();
      render();
    }
    input.value = '';
  };
  document.querySelectorAll('.worker-card').forEach(card => {
    card.onclick = () => {
      view.screen = 'detail';
      view.worker = card.dataset.name;
      view.month = currentMonthKeyDefault();
      safeHistory(() => history.pushState({screen:'detail', worker: view.worker, month: view.month}, '', '#'+encodeURIComponent(view.worker)));
      render();
    };
  });
}

function bindDetailEvents(){
  document.getElementById('backBtn').onclick = () => {
    view.screen = 'list';
    safeHistory(() => history.pushState({screen:'list'}, '', '#'));
    render();
  };
  const mKey = view.month || currentMonthKeyDefault();

  function shiftMonth(key, delta){
    let [y, m] = key.split('-').map(Number);
    m += delta;
    while(m < 1){ m += 12; y -= 1; }
    while(m > 12){ m -= 12; y += 1; }
    return `${y}-${String(m).padStart(2,'0')}`;
  }

  const prevBtn = document.getElementById('prevMonth');
  const nextBtn = document.getElementById('nextMonth');
  if(prevBtn) prevBtn.onclick = () => { view.month = shiftMonth(mKey, -1); render(); };
  if(nextBtn) nextBtn.onclick = () => { view.month = shiftMonth(mKey, 1); render(); };

  const monthSelect = document.getElementById('monthSelect');
  const yearSelect = document.getElementById('yearSelect');
  function applyMonthYearSelect(){
    const m = String(monthSelect.value).padStart(2,'0');
    const y = yearSelect.value;
    view.month = `${y}-${m}`;
    render();
  }
  if(monthSelect) monthSelect.onchange = applyMonthYearSelect;
  if(yearSelect) yearSelect.onchange = applyMonthYearSelect;

  document.getElementById('addEntryBtn').onclick = async () => {
    if(!requirePin()) return;
    const date = document.getElementById('entryDate').value;
    const hoursVal = document.getElementById('entryHours').value;
    const isLeave = document.getElementById('entryLeave').checked;
    if(!date) return;
    if(!isLeave && (hoursVal === '' || isNaN(Number(hoursVal)))) return;
    const name = view.worker;
    if(!state.entries[name]) state.entries[name] = [];
    // remove existing entry for same date, then add new
    state.entries[name] = state.entries[name].filter(e => e.date !== date);
    state.entries[name].push({ date, hours: isLeave ? 0 : Number(hoursVal), leave: isLeave });
    view.month = monthKey(date);
    await saveData();
    render();
  };

  document.getElementById('bulkAddBtn').onclick = async () => {
    if(!requirePin()) return;
    const text = document.getElementById('bulkText').value;
    const { results, skipped } = parseBulkText(text);
    const name = view.worker;
    if(!state.entries[name]) state.entries[name] = [];
    results.forEach(r => {
      state.entries[name] = state.entries[name].filter(e => e.date !== r.date);
      state.entries[name].push(r);
    });
    if(results.length){
      await saveData();
    }
    const resultBox = document.getElementById('bulkResult');
    let msg = `${toBn(results.length)}টি এন্ট্রি যোগ হয়েছে।`;
    if(skipped.length){
      msg += ` ${toBn(skipped.length)}টি লাইন বোঝা যায়নি, দেখে নিন।`;
    }
    resultBox.textContent = msg;
    if(results.length){
      setTimeout(() => { render(); }, 600);
    }
  };

  document.querySelectorAll('.del-btn').forEach(btn => {
    btn.onclick = async () => {
      if(!requirePin()) return;
      const i = Number(btn.dataset.idx);
      state.entries[view.worker].splice(i,1);
      await saveData();
      render();
    };
  });
}

function requirePin(){
  const pin = state.settings && state.settings.pin;
  if(!pin) return true;
  const entered = prompt('এডিট করতে পিন লিখুন:');
  if(entered === null) return false;
  if(entered !== pin){
    alert('ভুল পিন! এডিট করা যাবে না।');
    return false;
  }
  return true;
}

function safeHistory(action){
  try{ action(); }catch(e){ /* history API restricted in this environment; ignore */ }
}

window.addEventListener('popstate', (e) => {
  if(e.state && e.state.screen === 'detail'){
    view.screen = 'detail';
    view.worker = e.state.worker;
    view.month = e.state.month || currentMonthKeyDefault();
  } else if(e.state && e.state.screen === 'about'){
    view.screen = 'about';
  } else {
    view.screen = 'list';
  }
  render();
});

safeHistory(() => history.replaceState({screen:'list'}, '', '#'));
loadData();
</script>
</body>
</html>
